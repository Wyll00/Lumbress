# nginx para Lumbres — sustituir DOMINIO por el dominio real.
# Copiar a /etc/nginx/sites-available/lumbres y enlazar en sites-enabled.
# certbot --nginx añadirá luego el bloque SSL automáticamente.

server {
    listen 80;
    server_name DOMINIO www.DOMINIO;

    # Frontend compilado (npm run build -> dist/)
    root /var/www/lumbres/dist;
    index index.html;

    # SPA: cualquier ruta no-archivo cae en index.html (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache larga para assets con hash en el nombre
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API -> backend Node en :5001
    location /api/ {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Archivos subidos (portadas, audio, EPUB/PDF) -> backend
    location /uploads/ {
        proxy_pass http://127.0.0.1:5001;
        proxy_set_header Host $host;
    }

    # Subidas grandes (multer admite hasta 500 MB para audio de podcasts)
    client_max_body_size 600m;
}
